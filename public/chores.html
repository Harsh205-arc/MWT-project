<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Chores List</h1>

<form id="addChoreForm">
    <input type="text" id="title" placeholder="Chore title" required>
    <input type="number" id="assigned_to" placeholder="Assigned user ID" required>
    <button type="submit">Add Chore</button>
</form>

<br>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Assigned To</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="choresTable"></tbody>
</table>

<script src="chores.js"></script>

</body>
</html>
