<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>

<body>

<h2>Login / Registration Form</h2>

<form>

    First Name:
    <input type="text"><br><br>

    Middle Name:
    <input type="text"><br><br>

    Last Name:
    <input type="text"><br><br>

    Date of Birth:
    <input type="date"><br><br>

    Address:
    <textarea rows="3" cols="20"></textarea><br><br>

    Password:
    <input type="password"><br><br>

    Re-enter Password:
    <input type="password"><br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
